<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Notes Vault</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
}

.title{
text-align:center;
color:white;
font-size:34px;
margin-bottom:20px;
font-weight:bold;
}

.note-box{
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 8px 30px rgba(0,0,0,0.2);
margin-bottom:20px;
}

textarea{
width:100%;
height:140px;
padding:15px;
border:none;
outline:none;
resize:none;
font-size:16px;
border-radius:12px;
background:#f3f3f3;
}

.controls{
display:flex;
gap:10px;
margin-top:15px;
flex-wrap:wrap;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:15px;
transition:0.2s;
}

.save-btn{
background:#4CAF50;
color:white;
}

.save-btn:hover{
transform:scale(1.05);
}

.search{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-bottom:20px;
font-size:16px;
}

.notes-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:18px;
}

.note-card{
background:white;
padding:16px;
border-radius:15px;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
position:relative;
animation:fadeIn 0.3s ease;
}

.note-card p{
white-space:pre-wrap;
word-wrap:break-word;
padding-bottom:10px;
}

.note-date{
font-size:12px;
color:gray;
margin-top:10px;
}

.note-actions{
display:flex;
gap:8px;
margin-top:10px;
}

.edit-btn{
background:#2196F3;
color:white;
}

.delete-btn{
background:#f44336;
color:white;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>
<body>

<div class="container">

<div class="title">📝 My Notes Vault</div>

<input type="text" id="searchInput" class="search" placeholder="Search notes...">

<div class="note-box">
<textarea id="noteInput" placeholder="Write your notes here..."></textarea>

<div class="controls">
<button class="save-btn" onclick="saveNote()">Save Note</button>
</div>
</div>

<div class="notes-grid" id="notesContainer"></div>

</div>

<script>
let notes = JSON.parse(localStorage.getItem("notes")) || [];
let editIndex = -1;

function saveToStorage(){
localStorage.setItem("notes", JSON.stringify(notes));
}

function saveNote(){
const text = document.getElementById("noteInput").value.trim();

if(text==="") return;

if(editIndex===-1){
notes.unshift({
text:text,
date:new Date().toLocaleString()
});
}else{
notes[editIndex].text=text;
editIndex=-1;
}

saveToStorage();
document.getElementById("noteInput").value="";
displayNotes();
}

function displayNotes(){
const container=document.getElementById("notesContainer");
const search=document.getElementById("searchInput").value.toLowerCase();

container.innerHTML="";

notes
.filter(note=>note.text.toLowerCase().includes(search))
.forEach((note,index)=>{

container.innerHTML+=`
<div class="note-card">
<p>${note.text}</p>
<div class="note-date">${note.date}</div>

<div class="note-actions">
<button class="edit-btn" onclick="editNote(${index})">Edit</button>
<button class="delete-btn" onclick="deleteNote(${index})">Delete</button>
</div>
</div>
`;
});
}

function editNote(index){
document.getElementById("noteInput").value=notes[index].text;
editIndex=index;
window.scrollTo({top:0,behavior:"smooth"});
}

function deleteNote(index){
if(confirm("Delete this note?")){
notes.splice(index,1);
saveToStorage();
displayNotes();
}
}

document.getElementById("searchInput").addEventListener("input",displayNotes);

displayNotes();
</script>

</body>
</html>
